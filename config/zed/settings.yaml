base_keymap: VSCode
buffer_font_fallbacks:
  - Hurmit Nerd Font
  - monospace
buffer_font_family: Hermit
cli_default_open_behavior: new_window
collaboration_panel:
  dock: left
colorize_brackets: true
current_line_highlight: all
cursor_shape: block
ensure_final_newline_on_save: true
file_types:
  xml:
    - '*.axaml'
format_on_save: "on"
git_panel:
  dock: left
gutter:
  folds: true
indent_guides:
  coloring: indent_aware
  enabled: true
inlay_hints:
  enabled: true
  show_background: true
languages:
  AsciiDoc:
    soft_wrap: bounded
  Markdown:
    soft_wrap: bounded
  YAML:
    format_on_save: "off"
    tab_size: 2
linux:
  buffer_font_size: 15.0
  terminal:
    font_size: 15.0
  ui_font_size: 17.0
lsp_document_colors: inlay
macos:
  buffer_font_size: 13.0
  terminal:
    font_size: 13.0
    shell:
      program: /opt/homebrew/bin/fish
minimap:
  show: never
multi_cursor_modifier: cmd_or_ctrl
outline_panel:
  dock: left
preview_tabs:
  enable_preview_from_project_panel: false
project_panel:
  dock: right
  entry_spacing: comfortable
  file_icons: true
  folder_icons: false
  hide_root: true
  indent_size: 24.0
show_edit_predictions: true
show_whitespaces: all
tab_bar:
  show: true
tabs:
  file_icons: false
telemetry:
  diagnostics: false
  metrics: false
terminal:
  blinking: "on"
  font_fallbacks:
    - Hurmit Nerd Font
    - monospace
  font_family: Hermit
theme:
  mode: dark
title_bar:
  show_branch_name: true
  show_menus: false
  show_onboarding_banner: false
  show_project_items: true
  show_sign_in: false
  show_user_menu: false
  show_user_picture: true
toolbar:
  agent_review: false
  breadcrumbs: false
  quick_actions: false
  selections_menu: false
ui_font_family: Hermit
window_decorations: client
wrap_guides:
  - 80
  - 120
