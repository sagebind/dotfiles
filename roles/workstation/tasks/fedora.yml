- name: Install desired packages
  become: true
  ansible.builtin.dnf:
    name:
      - distrobox
      - firefox
      - fish
      - gnome-network-displays
      - google-droid-fonts-all
      - ImageMagick-heic
      - kitty
      - libva-utils
      - lsof
      - make
      - msedit
      - NetworkManager-tui
      - pcaro-hermit-fonts
      - powertop
      - prename
      - rclone
      - seafile-client
      - solaar
      - speech-dispatcher
      - speech-dispatcher-utils
      - stow
      - vdpauinfo
      - wireguard-tools
      - wl-clipboard
      - ydotool
    state: present

- name: Remove packages I don't need
  become: true
  ansible.builtin.dnf:
    name:
      - alacritty
      - brave-browser
      - libreoffice
      - libreoffice-base
      - libreoffice-calc
      - libreoffice-draw
      - libreoffice-emailmerge
      - libreoffice-impress
      - libreoffice-math
      - libreoffice-writer
    state: absent
    autoremove: true
