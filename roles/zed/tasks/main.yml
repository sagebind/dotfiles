- name: Install Zed for Linux using script
  when: ansible_facts['system'] == "Linux"
  ansible.builtin.command:
    cmd: "curl -f https://zed.dev/install.sh | sh"
    creates: "~/.local/bin/zed"

- name: Install Zed for macOS using Homebrew
  when: ansible_facts['os_family'] == "Darwin"
  community.general.homebrew_cask:
    name: zed
    state: present

- name: Ensure Zed config directory exists
  ansible.builtin.file:
    path: "~/.config/zed"
    state: directory
    mode: "0755"

- name: Read existing Zed settings
  ansible.builtin.slurp:
    src: "~/.config/zed/settings.json"
  register: zed_existing_settings_file
  ignore_errors: true

- name: Apply Zed settings
  vars:
    zed_existing_settings: "{{ (zed_existing_settings_file.content | b64decode | regex_replace(',(\\s*[}\\]])', '\\1') | from_json) if zed_existing_settings_file is not failed else {} }}"
    zed_desired_settings:
      base_keymap: VSCode
      buffer_font_fallbacks:
        - Hurmit Nerd Font
        - monospace
      buffer_font_family: Hermit
      cli_default_open_behavior: new_window
      collaboration_panel:
        dock: left
      colorize_brackets: true
      current_line_highlight: all
      cursor_shape: block
      ensure_final_newline_on_save: true
      file_types:
        xml:
          - '*.axaml'
      format_on_save: "on"
      git_panel:
        dock: left
      gutter:
        folds: true
      indent_guides:
        coloring: indent_aware
        enabled: true
      inlay_hints:
        enabled: true
        show_background: true
      languages:
        AsciiDoc:
          soft_wrap: bounded
        Markdown:
          soft_wrap: bounded
        YAML:
          format_on_save: "off"
          tab_size: 2
      linux:
        buffer_font_size: 15.0
        terminal:
          font_size: 15.0
        ui_font_size: 18.0
      lsp_document_colors: inlay
      macos:
        buffer_font_size: 13.0
        terminal:
          font_size: 13.0
          shell:
            program: /opt/homebrew/bin/fish
      minimap:
        show: never
      multi_cursor_modifier: cmd_or_ctrl
      outline_panel:
        dock: left
      preview_tabs:
        enable_preview_from_project_panel: false
      project_panel:
        dock: right
        entry_spacing: comfortable
        file_icons: true
        folder_icons: false
        hide_root: true
        indent_size: 24.0
      show_edit_predictions: true
      show_whitespaces: all
      tab_bar:
        show: true
      tabs:
        file_icons: false
      telemetry:
        diagnostics: false
        metrics: false
      terminal:
        blinking: "on"
        font_fallbacks:
          - Hurmit Nerd Font
          - monospace
        font_family: Hermit
      theme:
        mode: dark
      title_bar:
        show_branch_name: true
        show_menus: false
        show_onboarding_banner: false
        show_project_items: true
        show_sign_in: false
        show_user_menu: false
        show_user_picture: true
      toolbar:
        agent_review: false
        breadcrumbs: false
        quick_actions: false
        selections_menu: false
      window_decorations: client
      wrap_guides:
        - 80
        - 120
  ansible.builtin.copy:
    content: "{{ zed_existing_settings | combine(zed_desired_settings, recursive=true) | to_nice_json(indent=2) }}\n"
    dest: "~/.config/zed/settings.json"
    mode: "0644"

- name: Apply Zed keymap
  vars:
    keymap:
      - bindings:
          ctrl-p: file_finder::Toggle
      - context: Workspace
        unbind:
          ctrl-e: file_finder::Toggle
      - context: Pane
        bindings:
          ctrl-tab: pane::ActivateNextItem
          ctrl-shift-tab: pane::ActivatePreviousItem
      - context: Editor
        bindings:
          ctrl-up: editor::MoveLineUp
          ctrl-down: editor::MoveLineDown
      - context: (Editor && (showing_code_actions || showing_completions))
        unbind:
          ctrl-p: editor::ContextMenuPrevious
  ansible.builtin.copy:
    content: "{{ keymap | to_nice_json(indent=2) }}\n"
    dest: "~/.config/zed/keymap.json"
    mode: "0644"
